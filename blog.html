---
layout: default
title: Blog
---

<h2>Blog Posts</h2>

{% for post in site.posts %}
	<div class="postlist">
		<a href="{{ post.url }}" class="postlist-title">{{ post.title }}</a>
		<p class="postlist-date"> {{ post.date | date_to_string }}</p>
		<p class="postlist-subtitle"> {{post.subtitle}} </p>
	</div>

{% endfor %}
