    <footer id="mapFooter"></footer>

    <script>
      const mapData = `

 ::::::::::::  #!#@@@@@@ @#   :::::::::::::::::   @@@@@@@@@@@@@@@@@@@ @@@@@@@###@@@@@@@@@@@@@ ::   :::::::::::: 
 :::::::::::::  @@@@@     @   ::::::::::::::::: @@@@@@@@@@@@@@@@@@@@@@ @   @@@@#@@@@@@@@@@@@@ :::::::::::::::::

 ::::::::::::::::::    ##    @     :::::::::::: @@@@@@@@@@@@@@@@@@@@ @ :::::  @@  ::: @@@@    @ :-:::::::::::::

 ::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::::                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   
`;

      const lines = mapData.split('\n');
      const svg = document.getElementById('worldMap');
      const dotRadius = 0.35;
      const stayRadius = 0.5;
      const gridWidth = 112;

      // Update viewBox to match actual dimensions
      svg.setAttribute('viewBox', `0 0 ${gridWidth} ${lines.length}`);

      // Get CSS variable values
      const styles = getComputedStyle(document.documentElement);
      const colors = {
        land: styles.getPropertyValue('--text-color-muted').trim(),
        water: styles.getPropertyValue('--page-color').trim(),
        stay: 'rgb(196, 86, 47)',
        visit: 'rgb(196, 186, 47)',
        current: 'rgb(255, 10, 10)'
      };

      function createDot(x, y, fill, radius) {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', x + 0.5);
        circle.setAttribute('cy', y + 0.5);
        circle.setAttribute('r', radius);
        circle.setAttribute('fill', fill);
        svg.appendChild(circle);
      }

      let landCount = 0;
      let visitedCount = 0;

      lines.forEach((row, y) => {
        const paddedRow = row.padEnd(gridWidth, ' ');
        for (let x = 0; x < gridWidth; x++) {
          const char = paddedRow[x];
          if (char === '@') {
            createDot(x, y, colors.land, dotRadius);
            landCount++;
          } else if (char === '!') {
            createDot(x, y, colors.stay, dotRadius);
            visitedCount++;
          } else if (char === '*') {
            createDot(x, y, colors.current, stayRadius);
            visitedCount++;
          } else if (char === '#') {
            createDot(x, y, colors.visit, dotRadius);
            visitedCount++;
          } else {
            createDot(x, y, colors.water, dotRadius);
          }
        }
      });

      const totalLand = landCount + visitedCount;
      const percentage = ((visitedCount / totalLand) * 100).toFixed(1);
      document.getElementById('mapFooter').textContent = `${percentage}% explored`;
    </script>
